<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" font-family="Arial, sans-serif" font-size="12">
  <rect width="640" height="460" fill="#FAFAFA" rx="8"/>
  <rect width="640" height="460" fill="none" stroke="#E0E0E0" stroke-width="1.5" rx="8"/>

  <text x="320" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#212121">Anatomy of a Good Prompt</text>
  <text x="320" y="46" text-anchor="middle" font-size="11" fill="#757575">Four required sections for deterministic SolidWorks automation</text>

  <!-- Left prompt box (raw text) -->
  <rect x="18" y="60" width="310" height="360" rx="6" fill="white" stroke="#BDBDBD" stroke-width="1.5"/>
  <text x="173" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#424242">Prompt text</text>

  <!-- Section highlight bands inside prompt box -->
  <!-- Goal band -->
  <rect x="24" y="92" width="298" height="52" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="32" y="107" font-size="11" font-weight="bold" fill="#0D47A1">Goal:</text>
  <text x="32" y="122" font-size="10.5" fill="#212121">Create a 120 × 80 × 8 mm mounting plate</text>
  <text x="32" y="136" font-size="10.5" fill="#212121">with 4 corner holes Ø10 mm.</text>

  <!-- Inputs band -->
  <rect x="24" y="152" width="298" height="108" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="32" y="167" font-size="11" font-weight="bold" fill="#1B5E20">Inputs:</text>
  <text x="32" y="182" font-size="10.5" fill="#212121">- Units: mm</text>
  <text x="32" y="196" font-size="10.5" fill="#212121">- Plate: 120 × 80 × 8</text>
  <text x="32" y="210" font-size="10.5" fill="#212121">- Hole diameter: 10</text>
  <text x="32" y="224" font-size="10.5" fill="#212121">- Hole offset: 10 mm from each corner</text>
  <text x="32" y="238" font-size="10.5" fill="#212121">- Save: C:\Temp\plate.sldprt</text>
  <text x="32" y="252" font-size="10.5" fill="#212121">- Plane: Front</text>

  <!-- Constraints band -->
  <rect x="24" y="268" width="298" height="78" rx="3" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.2"/>
  <text x="32" y="283" font-size="11" font-weight="bold" fill="#E65100">Constraints:</text>
  <text x="32" y="298" font-size="10.5" fill="#212121">- Do not infer missing values.</text>
  <text x="32" y="312" font-size="10.5" fill="#212121">- Stop and ask if any tool fails.</text>
  <text x="32" y="326" font-size="10.5" fill="#212121">- Use only the tools listed above.</text>
  <text x="32" y="340" font-size="10.5" fill="#212121">- ASCII-only file paths.</text>

  <!-- Verification band -->
  <rect x="24" y="354" width="298" height="52" rx="3" fill="#FCE4EC" stroke="#C62828" stroke-width="1.2"/>
  <text x="32" y="369" font-size="11" font-weight="bold" fill="#B71C1C">Verification:</text>
  <text x="32" y="384" font-size="10.5" fill="#212121">- After each tool call, print: name + status.</text>
  <text x="32" y="398" font-size="10.5" fill="#212121">- Summarise all dimensions at the end.</text>

  <!-- Right side: explanation labels -->
  <!-- Goal label -->
  <line x1="322" y1="118" x2="360" y2="118" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="360" y="88" width="262" height="62" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="370" y="105" font-size="11" font-weight="bold" fill="#0D47A1">① Goal — one sentence</text>
  <text x="370" y="120" font-size="10.5" fill="#212121">Concrete outcome. No adjectives.</text>
  <text x="370" y="134" font-size="10.5" fill="#212121">Measurements, not descriptions.</text>
  <text x="370" y="146" font-size="10.5" fill="#757575">✓ "120 × 80 × 8 mm"  ✗ "large plate"</text>

  <!-- Inputs label -->
  <line x1="322" y1="206" x2="360" y2="206" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="360" y="170" width="262" height="76" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="370" y="187" font-size="11" font-weight="bold" fill="#1B5E20">② Inputs — all numbers explicit</text>
  <text x="370" y="202" font-size="10.5" fill="#212121">Every dimension, unit, path, plane.</text>
  <text x="370" y="217" font-size="10.5" fill="#212121">Don't rely on the model's defaults.</text>
  <text x="370" y="232" font-size="10.5" fill="#757575">Include the save path — required by save_as.</text>

  <!-- Constraints label -->
  <line x1="322" y1="307" x2="360" y2="307" stroke="#F57F17" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="360" y="271" width="262" height="72" rx="6" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
  <text x="370" y="288" font-size="11" font-weight="bold" fill="#E65100">③ Constraints — guard rails</text>
  <text x="370" y="303" font-size="10.5" fill="#212121">Prevent hallucination and silent fallback.</text>
  <text x="370" y="318" font-size="10.5" fill="#212121">"Stop and ask" prevents runaway chains.</text>
  <text x="370" y="333" font-size="10.5" fill="#757575">ASCII paths avoid COM unicode issues.</text>

  <!-- Verification label -->
  <line x1="322" y1="380" x2="360" y2="380" stroke="#C62828" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="360" y="352" width="262" height="62" rx="6" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
  <text x="370" y="369" font-size="11" font-weight="bold" fill="#B71C1C">④ Verification — audit trail</text>
  <text x="370" y="384" font-size="10.5" fill="#212121">Confirms each step succeeded. Makes</text>
  <text x="370" y="398" font-size="10.5" fill="#212121">debugging trivial when a step fails.</text>

  <!-- Bottom note -->
  <rect x="18" y="428" width="604" height="22" fill="#F5F5F5" rx="4"/>
  <text x="320" y="443" text-anchor="middle" font-size="10.5" fill="#424242">Copy the "Golden Prompt" format from prompting-best-practices.md and fill in your part's values.</text>
</svg>
