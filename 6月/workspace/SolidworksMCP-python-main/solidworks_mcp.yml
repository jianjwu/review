name: solidworks_mcp
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - git
  - build
  - wheel
  - setuptools
  - nodejs # For MkDocs plugins
  - pip:
      - uv # Fast Python package manager
      # Core MCP dependencies
      - pydantic>=2.5.0
      - typing-extensions>=4.8.0

      # SolidWorks COM interface (Windows only)  
      - comtypes>=1.4.0 ; sys_platform=="win32"
      - pywin32>=306 ; sys_platform=="win32"

      # Development dependencies
      - pytest>=7.4.0
      - pytest-asyncio>=0.21.0
      - pytest-cov>=4.0.0
      - pytest-xdist>=3.3.0
      - black>=23.0.0
      - ruff>=0.1.0
      - mypy>=1.7.0
      - pre-commit>=3.5.0

      # Documentation
      - mkdocs>=1.5.0
      - mkdocs-material>=9.4.0
      - mkdocs-mermaid2-plugin>=1.1.0
      - mkdocs-awesome-pages-plugin>=2.9.0
      - "mkdocstrings[python]>=0.24.0"
      - pymdown-extensions>=10.4.0

      # Utilities
      - rich>=13.0.0
      - click>=8.1.0
      - pyyaml>=6.0.1
